<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ItExists - Pick a Profile</title>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="app-shell text-[#f7f2ea] min-h-screen">
    <div class="page-wrap page-enter">
      <header class="top-actions">
        <button id="newProfileBtn" class="action-button action-button-primary shrink-0">
          New Profile
        </button>
      </header>

      <main class="page-stack">
        <section id="createProfilePanel" class="surface-panel center-panel landing-panel">
          <p class="eyebrow landing-eyebrow">Pick or Create a Profile</p>
          <h1 class="brand-mark landing-brand">ItExists</h1>
          <p class="landing-copy">Enter a name, get assigned a ridiculous identity, and pick up where you left off.</p>

          <form id="loginForm" class="page-stack landing-form">
            <label for="nameInput" class="landing-label">Login Name</label>
            <input
              id="nameInput"
              type="text"
              maxlength="120"
              required
              class="field-input landing-input"
              placeholder="Type your suspiciously confident name"
            />
            <button id="submitBtn" type="submit" class="action-button action-button-primary landing-submit">
              Create and Enter
            </button>
            <p id="statusText" class="status-text"></p>
          </form>
        </section>

        <section class="surface-panel p-6 md:p-7">
          <div class="section-head mb-4">
            <h2 class="text-2xl md:text-3xl font-semibold">Saved Profiles</h2>
            <button id="refreshProfilesBtn" class="action-button action-button-ghost">Refresh</button>
          </div>

          <div class="saved-profiles-scroll">
            <div id="savedProfiles" class="saved-profiles-grid"></div>
          </div>
          <p id="profilesStatus" class="status-text muted-copy mt-4"></p>
        </section>
      </main>

      <div id="footerMount"></div>
    </div>

    <div id="landingToast" class="toast hidden"></div>

    <script src="/js/footer.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
